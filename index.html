<!DOCTYPE html>
<html lang="ko">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-D73KL470HQ"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-D73KL470HQ');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>시냅스 스파크 | 매일 1분 뇌 부팅 퀴즈</title>
    <meta name="description" content="매일 아침 00시, 새로운 지능형 퀴즈가 찾아옵니다. 당신의 시냅스를 깨우고 랭킹에 도전하세요!">
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://koreanboar.github.io/Synapse-Spark/">
    <meta property="og:title" content="시냅스 스파크⚡ 당신의 뇌는 오늘 깨어있습니까?">
    <meta property="og:image" content="https://cdn-icons-png.flaticon.com/512/1164/1164620.png">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#222222">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1164/1164620.png">

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <link rel="stylesheet" href="style.css?v=1.6">
</head>
<body>
    <div id="watermark">by 멧돼지</div>
    <div id="penalty-overlay" style="display:none;">+30초 페널티 발생!</div>

    <div class="container">
        <header>
            <div id="streak-display">🔥 <span id="streak-count">0</span>일 연속 부팅 중</div>
            <h1>Synapse Spark</h1>
            <div id="timer">00:00:00</div>
        </header>
        <main>
            <section id="login-screen">
                <h2>오늘의 뇌 부팅을 시작할까요?</h2>
                <div class="input-group">
                    <input type="text" id="nickname" placeholder="닉네임을 입력하세요">
                    <button id="start-btn">부팅 시작</button>
                </div>
            </section>

            <section id="quiz-screen" style="display:none;">
                <div id="memo-wrapper">
                    <canvas id="memo-canvas"></canvas>
                    <div id="lives-container">
                        <span class="heart">❤️</span><span class="heart">❤️</span><span class="heart">❤️</span>
                    </div>
                    <div id="problem-area">
                        <p id="problem-text"></p>
                        <p id="hint-display" style="display:none;"></p>
                    </div>
                    <div id="memo-tools">
                        <div class="color-picker">
                            <div class="color-dot active" data-color="#4a90e2" style="background:#4a90e2;"></div>
                            <div class="color-dot" data-color="#ff4757" style="background:#ff4757;"></div>
                            <div class="color-dot" data-color="#222222" style="background:#222222;"></div>
                        </div>
                        <button id="clear-memo-btn">초기화</button>
                    </div>
                </div>

                <div class="footer-controls">
                    <div id="hint-area" style="margin-bottom: 25px;">
                        <button id="hint-btn" class="secondary-btn">💡 사고의 실타래 풀기 (힌트)</button>
                    </div>
                    <div id="input-container">
                        <div class="input-group">
                            <input type="text" id="answer" placeholder="정답을 입력하세요">
                            <button id="submit-btn">제출</button>
                        </div>
                        <p id="answer-guide"></p>
                    </div>

                    <div id="result-area" style="display:none;">
                        <div id="result-content-box"></div>
                        <p id="result-msg"></p>
                        <button id="share-btn" class="share-btn">결과 이모지 복사하기</button>
                    </div>
                </div>
            </section>
        </main>

        <aside id="ranking-sidebar">
            <h3>오늘의 TOP 10</h3>
            <ul id="ranking-list"><li>로딩 중...</li></ul>
        </aside>
    </div>

    <script src="script.js?v=1.6"></script>
</body>
</html>
